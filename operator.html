<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Operator - Chemical Log</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:#1e293b;border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
h1{text-align:center;color:#38bdf8;font-size:18px;margin-bottom:2px}
.sub{text-align:center;color:#475569;font-size:11px;margin-bottom:20px}
label{display:block;font-size:11px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:12px 0 4px}
select,input{width:100%;padding:10px 12px;background:#0f172a;border:1px solid #334155;border-radius:9px;color:#e2e8f0;font-size:14px;outline:none}
select:focus,input:focus{border-color:#38bdf8}
.row{display:flex;gap:8px}
.row>div{flex:1}
.mic-row{display:flex;gap:8px}
.mic-row input{flex:1}
.mic{background:#1d4ed8;border:none;border-radius:9px;padding:10px 14px;cursor:pointer;font-size:18px;flex-shrink:0}
.mic.on{background:#dc2626;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sugg{background:#0f172a;border:1px solid #334155;border-radius:9px;margin-top:3px;display:none;max-height:160px;overflow-y:auto}
.sugg div{padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #1e293b}
.sugg div:hover{background:#1e293b;color:#38bdf8}
.btn{width:100%;margin-top:20px;padding:13px;background:linear-gradient(135deg,#0ea5e9,#2563eb);border:none;border-radius:11px;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
.btn:disabled{opacity:.4}
.toast{margin-top:12px;padding:10px;border-radius:9px;text-align:center;font-size:13px;font-weight:600;display:none}
.ok{background:#064e3b;color:#6ee7b7;display:block}
.err{background:#7f1d1d;color:#fca5a5;display:block}
</style>
</head>
<body>
<div class="card">
  <h1>🧪 Fakir Apparels Ltd</h1>
  <p class="sub">Chemical Consumption — Operator Panel</p>

  <label>👤 Operator</label>
  <select id="op">
    <option value="">-- Select Your Name --</option>
    <option>Raedh</option><option>Hasan</option><option>Sabbir (বরিশাল)</option><option>Rahinur</option><option>Sochin</option><option>Rahman</option><option>Sabbir</option><option>Rabbani</option><option>Rashid</option><option>Nurullah</option><option>Junayed</option><option>Momrul</option><option>Mostafiz</option><option>Saju</option><option>Mahfuz</option><option>Robin</option><option>Mahabub</option><option>Sojib</option><option>Hossain</option><option>Nayeem</option><option>Jewel</option><option>Lipon</option><option>Biplob</option><option>Showrob</option><option>Mahim</option><option>Parvez</option><option>Keshob</option><option>Mohasin</option><option>Jakir</option><option>Mizan</option><option>Sariful</option><option>Kawsar - 1</option><option>Kawser - 2</option><option>Sudorshon</option><option>Jahangir</option><option>Lokman</option><option>Yamin</option><option>Arif</option><option>Kamal</option><option>Babul</option><option>Sumon</option><option>Rifat</option>
  </select>

  <label>🏭 Buyer</label>
  <input id="buyer" placeholder="e.g. H&M, Zara, Next..."/>

  <label>👔 Style</label>
  <input id="style" placeholder="Style number or name..."/>

  <div class="row">
    <div>
      <label>🎨 Color</label>
      <input id="color" placeholder="Color name..."/>
    </div>
    <div>
      <label>👕 Qty (pcs)</label>
      <input id="qty" type="number" placeholder="0" min="0"/>
    </div>
  </div>

  <label>🧴 Chemical — Type or 🎙️ Voice</label>
  <div class="mic-row">
    <input id="chemIn" placeholder="Type or speak chemical name..." oninput="showSugg(this.value)"/>
    <button class="mic" id="micBtn" onclick="toggleMic()">🎙️</button>
  </div>
  <div class="sugg" id="sugg"></div>

  <label>Or pick from list</label>
  <select id="chemSel" onchange="pickChem(this.value)">
    <option value="">-- Select Chemical --</option>
    <option>Silicon</option><option>Glauber Salt</option><option>Eropen-R</option><option>Sequestering Agent</option><option>Avco Fix PDC</option><option>Novapret SPF</option><option>Meta</option><option>Acid</option><option>Salt</option><option>Ot Conc</option><option>Cra</option><option>Silvatol</option><option>Peroxide</option><option>Tubingal</option><option>Aticres</option><option>Bainder</option><option>Silicone</option><option>Textport</option><option>Supradet</option><option>Sera Gal</option><option>C Scamas</option><option>Nutra Acid</option><option>Softnar</option><option>Lavelling</option><option>Jingen Neutra Acid</option><option>Antiback Stainer</option><option>Anticreasing Agent</option><option>Meta Bi Sulphite</option><option>Soda Ash</option><option>Caustic Soda</option><option>Hydrogen Peroxide</option><option>Detergent</option><option>Leveling Agent</option><option>Potassium Permanganate</option><option>Softener</option><option>Saftnar</option>
  </select>

  <label>📦 Amount & Unit</label>
  <div class="row">
    <div style="flex:2"><input id="amount" type="number" placeholder="e.g. 5.5" min="0" step="0.01"/></div>
    <div style="flex:1"><select id="unit"><option>KG</option><option>Liter</option><option>Gram</option><option>ML</option><option>Drum</option><option>Bag</option></select></div>
  </div>

  <label>📝 Notes (Optional)</label>
  <input id="notes" placeholder="Any remarks..."/>

  <button class="btn" onclick="submitLog()">✅ Submit Log</button>
  <div class="toast" id="toast"></div>
</div>
<script>
const SURL="https://ynnfvmezkrqkuiggprtb.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlubmZ2bWV6a3Jxa3VpZ2dwcnRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjU3MTksImV4cCI6MjA4OTIwMTcxOX0.b3ykhcba-oDxWfjeMQvK4_4-VkGVeLeapVEfoXlztjw";
const chems=["Silicon","Glauber Salt","Eropen-R","Sequestering Agent","Avco Fix PDC","Novapret SPF","Meta","Acid","Salt","Ot Conc","Cra","Silvatol","Peroxide","Tubingal","Aticres","Bainder","Silicone","Textport","Supradet","Sera Gal","C Scamas","Nutra Acid","Softnar","Lavelling","Jingen Neutra Acid","Antiback Stainer","Anticreasing Agent","Meta Bi Sulphite","Soda Ash","Caustic Soda","Hydrogen Peroxide","Detergent","Leveling Agent","Potassium Permanganate","Softener","Saftnar"];
const alias={"meta":"Meta Bi Sulphite","metabi":"Meta Bi Sulphite","sodium meta":"Meta Bi Sulphite","soda":"Soda Ash","caustic":"Caustic Soda","h2o2":"Hydrogen Peroxide","peroxide":"Hydrogen Peroxide","kp":"Potassium Permanganate","pp":"Potassium Permanganate","soft":"Softener","seq":"Sequestering Agent","level":"Leveling Agent","glauber":"Glauber Salt","acid":"Acid","salt":"Salt","silicon":"Silicon","silicone":"Silicone","detergent":"Detergent","cra":"Cra","ot":"Ot Conc"};
function matchChem(t){t=t.toLowerCase().trim();if(alias[t])return alias[t];for(let k in alias)if(t.includes(k))return alias[k];return chems.find(c=>c.toLowerCase().includes(t))||t}
function showSugg(v){const b=document.getElementById("sugg");if(!v){b.style.display="none";return}const m=chems.filter(c=>c.toLowerCase().includes(v.toLowerCase())).slice(0,5);if(!m.length){b.style.display="none";return}b.innerHTML=m.map(x=>`<div onclick="pickChem('${x}')">${x}</div>`).join("");b.style.display="block"}
function pickChem(n){document.getElementById("chemIn").value=n;document.getElementById("chemSel").value=n;document.getElementById("sugg").style.display="none"}
let rec;
function toggleMic(){const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SR){alert("Use Chrome for voice");return}const btn=document.getElementById("micBtn");if(rec){rec.stop();return}rec=new SR();rec.lang="en-US";rec.onresult=e=>{const raw=e.results[0][0].transcript;const matched=matchChem(raw);pickChem(matched);btn.classList.remove("on");rec=null};rec.onerror=()=>{btn.classList.remove("on");rec=null};rec.onend=()=>{btn.classList.remove("on");rec=null};rec.start();btn.classList.add("on")}
async function submitLog(){
  const op=document.getElementById("op").value;
  const chem=document.getElementById("chemIn").value||document.getElementById("chemSel").value;
  const amount=document.getElementById("amount").value;
  const toast=document.getElementById("toast");
  if(!op||!chem||!amount){toast.className="toast err";toast.textContent="⚠️ Fill Operator, Chemical and Amount!";return}
  const data={operator:op,buyer:document.getElementById("buyer").value,style:document.getElementById("style").value,color:document.getElementById("color").value,garment_quantity:parseInt(document.getElementById("qty").value)||0,chemical:chem,amount:parseFloat(amount),unit:document.getElementById("unit").value,notes:document.getElementById("notes").value,logged_at:new Date().toISOString()};
  try{
    const r=await fetch(`${SURL}/rest/v1/chemical_logs`,{method:"POST",headers:{"Content-Type":"application/json","apikey":SKEY,"Authorization":`Bearer ${SKEY}`,"Prefer":"return=minimal"},body:JSON.stringify(data)});
    if(r.ok){toast.className="toast ok";toast.textContent="✅ Submitted successfully!";document.querySelectorAll("input").forEach(e=>e.value="");document.querySelectorAll("select").forEach(e=>e.selectedIndex=0)}
    else throw new Error()
  }catch{toast.className="toast err";toast.textContent="❌ Failed! Check Supabase settings."}
}
</script>
</body>
</html>
