<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard - Chemical Tracking</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh}
.lcard{background:#1e293b;padding:32px;border-radius:16px;width:320px;text-align:center}
.lcard h2{color:#38bdf8;margin-bottom:4px}
.lcard p{color:#475569;font-size:12px;margin-bottom:20px}
.lcard input{width:100%;padding:11px;background:#0f172a;border:1px solid #334155;border-radius:9px;color:#e2e8f0;font-size:14px;outline:none;margin-bottom:10px}
.lcard input:focus{border-color:#38bdf8}
.lcard button{width:100%;padding:12px;background:linear-gradient(135deg,#0ea5e9,#2563eb);border:none;border-radius:9px;color:#fff;font-weight:700;font-size:15px;cursor:pointer}
#loginErr{color:#f87171;font-size:12px;margin-top:8px}
.dash{display:none;padding:20px}
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
header h1{color:#38bdf8;font-size:18px}
.hbtns{display:flex;gap:8px}
.hbtns button{background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:7px 13px;border-radius:8px;cursor:pointer;font-size:12px}
.hbtns button:hover{border-color:#38bdf8;color:#38bdf8}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.stat{background:#1e293b;border-radius:12px;padding:16px;text-align:center}
.stat .val{font-size:26px;font-weight:700;color:#38bdf8}
.stat .lbl{font-size:11px;color:#64748b;margin-top:3px}
.charts{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:20px}
.box{background:#1e293b;border-radius:12px;padding:16px}
.box h3{font-size:12px;color:#94a3b8;margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.filters select,.filters input{padding:8px 10px;background:#0f172a;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:12px;outline:none;flex:1;min-width:120px}
.fbtns{display:flex;gap:8px;margin-bottom:14px}
.fbtns button{padding:8px 14px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600}
.fb1{background:#0ea5e9;color:#fff}.fb2{background:#475569;color:#fff}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{color:#475569;text-align:left;padding:7px 8px;border-bottom:1px solid #334155;font-weight:600;text-transform:uppercase;font-size:10px;white-space:nowrap}
td{padding:8px;border-bottom:1px solid #1e293b;color:#cbd5e1;white-space:nowrap}
tr:hover td{background:#263347}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;background:#1e3a5f;color:#7dd3fc}
.empty{text-align:center;color:#475569;padding:24px;font-size:13px}
</style>
</head>
<body>
<div class="login" id="loginScreen">
  <div class="lcard">
    <h2>🔐 Admin Login</h2>
    <p>Fakir Apparels — Chemical Tracking</p>
    <input type="password" id="passInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')login()"/>
    <button onclick="login()">Login →</button>
    <p id="loginErr"></p>
  </div>
</div>
<div class="dash" id="dashboard">
  <header>
    <h1>📊 Chemical Dashboard</h1>
    <div class="hbtns">
      <button onclick="loadData()">🔄 Refresh</button>
      <button onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="stats">
    <div class="stat"><div class="val" id="totalLogs">-</div><div class="lbl">Total Logs</div></div>
    <div class="stat"><div class="val" id="todayLogs">-</div><div class="lbl">Today</div></div>
    <div class="stat"><div class="val" id="topChem">-</div><div class="lbl">Top Chemical</div></div>
    <div class="stat"><div class="val" id="topOp">-</div><div class="lbl">Top Operator</div></div>
  </div>
  <div class="charts">
    <div class="box"><h3>Chemical Usage (Top 10)</h3><canvas id="chemChart" height="200"></canvas></div>
    <div class="box"><h3>Operator Activity (Top 10)</h3><canvas id="opChart" height="200"></canvas></div>
  </div>
  <div class="box">
    <h3>All Logs</h3>
    <div class="filters">
      <input type="date" id="filterDate"/>
      <select id="filterChem"><option value="">All Chemicals</option><option>Silicon</option><option>Glauber Salt</option><option>Eropen-R</option><option>Sequestering Agent</option><option>Avco Fix PDC</option><option>Novapret SPF</option><option>Meta</option><option>Acid</option><option>Salt</option><option>Ot Conc</option><option>Cra</option><option>Silvatol</option><option>Peroxide</option><option>Tubingal</option><option>Aticres</option><option>Bainder</option><option>Silicone</option><option>Textport</option><option>Supradet</option><option>Sera Gal</option><option>C Scamas</option><option>Nutra Acid</option><option>Softnar</option><option>Lavelling</option><option>Jingen Neutra Acid</option><option>Antiback Stainer</option><option>Anticreasing Agent</option><option>Meta Bi Sulphite</option><option>Soda Ash</option><option>Caustic Soda</option><option>Hydrogen Peroxide</option><option>Detergent</option><option>Leveling Agent</option><option>Potassium Permanganate</option><option>Softener</option><option>Saftnar</option></select>
      <select id="filterOp"><option value="">All Operators</option><option>Raedh</option><option>Hasan</option><option>Sabbir (বরিশাল)</option><option>Rahinur</option><option>Sochin</option><option>Rahman</option><option>Sabbir</option><option>Rabbani</option><option>Rashid</option><option>Nurullah</option><option>Junayed</option><option>Momrul</option><option>Mostafiz</option><option>Saju</option><option>Mahfuz</option><option>Robin</option><option>Mahabub</option><option>Sojib</option><option>Hossain</option><option>Nayeem</option><option>Jewel</option><option>Lipon</option><option>Biplob</option><option>Showrob</option><option>Mahim</option><option>Parvez</option><option>Keshob</option><option>Mohasin</option><option>Jakir</option><option>Mizan</option><option>Sariful</option><option>Kawsar - 1</option><option>Kawser - 2</option><option>Sudorshon</option><option>Jahangir</option><option>Lokman</option><option>Yamin</option><option>Arif</option><option>Kamal</option><option>Babul</option><option>Sumon</option><option>Rifat</option></select>
    </div>
    <div class="fbtns">
      <button class="fb1" onclick="applyFilters()">Filter</button>
      <button class="fb2" onclick="clearFilters()">Clear</button>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>#</th><th>Date & Time</th><th>Operator</th><th>Buyer</th><th>Style</th><th>Color</th><th>Qty</th><th>Chemical</th><th>Amount</th><th>Notes</th></tr></thead>
        <tbody id="logsTable"><tr><td colspan="10" class="empty">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<script>
const SURL="https://ynnfvmezkrqkuiggprtb.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlubmZ2bWV6a3Jxa3VpZ2dwcnRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MjU3MTksImV4cCI6MjA4OTIwMTcxOX0.b3ykhcba-oDxWfjeMQvK4_4-VkGVeLeapVEfoXlztjw";
const PASS="fakir@2024";
let allLogs=[],cc,oc;

function login(){
  if(document.getElementById("passInput").value===PASS){
    document.getElementById("loginScreen").style.display="none";
    document.getElementById("dashboard").style.display="block";
    loadData();
  }else{document.getElementById("loginErr").textContent="❌ Wrong password!"}
}
function logout(){document.getElementById("loginScreen").style.display="flex";document.getElementById("dashboard").style.display="none";document.getElementById("passInput").value=""}

async function loadData(){
  try{
    const r=await fetch(`${SURL}/rest/v1/chemical_logs?order=logged_at.desc&limit=1000`,{headers:{"apikey":SKEY,"Authorization":`Bearer ${SKEY}`}});
    allLogs=await r.json();renderAll(allLogs);
  }catch{document.getElementById("logsTable").innerHTML='<tr><td colspan="10" class="empty">⚠️ Failed to load.</td></tr>'}
}

function renderAll(logs){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById("totalLogs").textContent=logs.length;
  document.getElementById("todayLogs").textContent=logs.filter(l=>l.logged_at?.slice(0,10)===today).length;
  const cc2={},oc2={};
  logs.forEach(l=>{cc2[l.chemical]=(cc2[l.chemical]||0)+1;oc2[l.operator]=(oc2[l.operator]||0)+1});
  const topC=Object.entries(cc2).sort((a,b)=>b[1]-a[1])[0];
  const topO=Object.entries(oc2).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById("topChem").textContent=topC?topC[0].split(" ")[0]:"-";
  document.getElementById("topOp").textContent=topO?topO[0].split(" ")[0]:"-";
  const t10c=Object.entries(cc2).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const t10o=Object.entries(oc2).sort((a,b)=>b[1]-a[1]).slice(0,10);
  if(cc)cc.destroy();if(oc)oc.destroy();
  cc=new Chart(document.getElementById("chemChart"),{type:"bar",data:{labels:t10c.map(x=>x[0]),datasets:[{data:t10c.map(x=>x[1]),backgroundColor:"#0ea5e9",borderRadius:5}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#64748b",font:{size:9}}},y:{ticks:{color:"#64748b"},grid:{color:"#1e293b"}}}}});
  oc=new Chart(document.getElementById("opChart"),{type:"bar",data:{labels:t10o.map(x=>x[0]),datasets:[{data:t10o.map(x=>x[1]),backgroundColor:"#6366f1",borderRadius:5}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:"#64748b",font:{size:9}}},y:{ticks:{color:"#64748b"},grid:{color:"#1e293b"}}}}});
  renderTable(logs);
}

function renderTable(logs){
  const tb=document.getElementById("logsTable");
  if(!logs.length){tb.innerHTML='<tr><td colspan="10" class="empty">No logs found.</td></tr>';return}
  tb.innerHTML=logs.map((l,i)=>`<tr><td>${i+1}</td><td>${l.logged_at?new Date(l.logged_at).toLocaleString():"-"}</td><td>${l.operator||"-"}</td><td>${l.buyer||"-"}</td><td>${l.style||"-"}</td><td>${l.color||"-"}</td><td>${l.garment_quantity||0}</td><td>${l.chemical||"-"}</td><td><span class="badge">${l.amount||0} ${l.unit||""}</span></td><td>${l.notes||"-"}</td></tr>`).join("");
}

function applyFilters(){
  let f=[...allLogs];
  const d=document.getElementById("filterDate").value;
  const c=document.getElementById("filterChem").value;
  const o=document.getElementById("filterOp").value;
  if(d)f=f.filter(l=>l.logged_at?.slice(0,10)===d);
  if(c)f=f.filter(l=>l.chemical===c);
  if(o)f=f.filter(l=>l.operator===o);
  renderTable(f);
}
function clearFilters(){document.getElementById("filterDate").value="";document.getElementById("filterChem").value="";document.getElementById("filterOp").value="";renderTable(allLogs)}
</script>
</body>
</html>
